<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="./favicon.png" type="image/png">
<title>Login</title>
<link href="./css/style_1.css" rel="stylesheet">
<link href="./css/style_2.css" rel="stylesheet">
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Login Card -->
<div class="card">
  <h1>登录</h1>
  <div class="field">
    <input type="email" id="loginEmail" placeholder="输入您的邮箱">
    <div class="msg" id="loginEmailMsg"></div>
  </div>
  <div class="field">
    <input type="password" id="loginPwd" placeholder="输入您的密码">
    <div class="msg" id="loginPwdMsg"></div>
  </div>
  <div class="row">
    <label class="remember">
      <input type="checkbox" id="rememberMe" checked> 记住我
    </label>
    <a href="#" class="forgot">忘记密码？</a>
  </div>
  <button class="btn-login" id="loginBtn" onclick="handleLogin()">登录</button>
  <div class="register-link">
    没有账户？<a onclick="openRegister()">立即注册</a>
  </div>
</div>

<!-- Register Modal -->
<div class="modal-backdrop" id="regModal">
  <div class="modal-card">
    <button class="close-btn" onclick="closeRegister()">×</button>
    <h1>注册</h1>

    <div class="field">
      <input type="email" id="regEmail" placeholder="输入您的邮箱" oninput="clearMsg('regEmailMsg')">
      <div class="msg" id="regEmailMsg"></div>
    </div>

    <div class="field">
      <input type="text" id="regName" placeholder="输入您的用户名（2-20字符）" oninput="clearMsg('regNameMsg')">
      <div class="msg" id="regNameMsg"></div>
    </div>

    <div class="field">
      <input type="password" id="regPwd" placeholder="输入您的密码（8-32位）"
             oninput="onPwdInput()">
      <div class="pwd-strength" id="pwdStrength">
        <div class="pwd-strength-bar"><div class="pwd-strength-fill" id="pwdFill"></div></div>
        <div class="pwd-strength-label" id="pwdLabel"></div>
      </div>
      <div class="pwd-reqs" id="pwdReqs">
        <span id="req-len">· 长度 8-32 个字符</span>
        <span id="req-upper">· 至少一个大写字母 (A-Z)</span>
        <span id="req-lower">· 至少一个小写字母 (a-z)</span>
        <span id="req-num">· 至少一个数字 (0-9)</span>
      </div>
      <div class="msg" id="regPwdMsg"></div>
    </div>

    <div class="field">
      <input type="password" id="regPwd2" placeholder="确认您的密码" oninput="checkPwdMatch()">
      <div class="msg" id="pwdError"></div>
    </div>

    <div style="margin-top: 6px;">
      <button class="btn-login" id="regBtn" onclick="handleRegister()">注册</button>
    </div>
    <div class="register-link" style="margin-top:16px;">
      已经有账户了？<a onclick="closeRegister()">返回登录</a>
    </div>
  </div>
</div>

<script src="./script/script.js"></script>
</body>
</html>
